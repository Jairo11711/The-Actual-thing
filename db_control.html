<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<form method="post" action="{% url 'db_control'}">
    <h3>Customer</h3>
    <label for="customer-name">Name</label>
    <input type="text" max="1000" min="0" maxlength="20">
    <br>
    <hr>

    <h3>Product</h3>
    <label for="product-name">Name</label>
    <input type="text" minlength="3" maxlength="20">
    <br>
    <label for="product-price">Price Php</label>
    <input type="number" minlength="3" maxlength="20">
    <br>
    <hr>

    <h3>Transaction</h3>
    <label for="transaction-customer">Customer</label>
    <select>
        <option> Abra</option>
        <option> Bellroom</option>
    </select>
    <br>
    <label for="transaction-product">Product</label>
    <select>
        <option> Ash</option>
        <option> Misty</option>
    </select>

    <label for="form-submit">Submit</label>
    <input type="submit">
    </form>
</body>

</html>
