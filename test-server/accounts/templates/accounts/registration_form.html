{% extends 'public_login_base.html' %}


{% block sign-direction %}
    <div class="signup-text">
    <p class="signup">Already have an account?</p>
    <a class="signup link" href="{% url 'accounts:login' %}">LOGIN</a>
    </div>
{% endblock sign-direction %}
    


{% block content %}
    <div class="round-pink-box-container">
        <div class="round-pink-box">
            <h1 class="login-label h1">Registration</h1>

            <form class="login-form" action="{% url 'accounts:login' %}" method="post">
                {% csrf_token %}
                <div class="entry-field">
                    <label class="login-label">Username</label>
                    <input class="login-input" type="text" name="username" >
                </div>
                <div class="entry-field">
                    <label class="login-label">Password</label>
                    <input class="login-input" type="password" name="password" >
                </div>
                <input class="login-input submit" type="submit" value="Register">
            </form>
        </div>
    </div>
{% endblock content %}
